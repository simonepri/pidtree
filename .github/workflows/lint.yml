name: lint

on:
  push:
    branches: '*'
  pull_request:
    branches: '*'

jobs:
  lint:
    runs-on: ubuntu-latest
    name: XO & Prettier
    steps:
      - name: Setup repo
        uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dev dependencies
        run: |
          npm install --only=dev
          npm list --dev --depth=0
      - name: Run lint
        run: npm run lint
